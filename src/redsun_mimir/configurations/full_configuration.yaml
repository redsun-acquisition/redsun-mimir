schema_version: 1.0
session: redsun-mimir
frontend: pyqt

devices:
  camera1:
    config: demo
  xy-motor:
    config: demoxy
  z-motor:
    config: demoz
  led:
    wavelength: 300
    binary: true
    intensity_range: [0, 0]
  laser:
    wavelength: 650
    egu: mW
    intensity_range: [0, 100]
    step_size: 1

presenters:
  storage_ctrl: {}
  acq_ctrl:
    callbacks: [det_ctrl, median_ctrl]
  median_ctrl:
    median_streams: [square_scan]
    live_streams: [live]
  light_ctrl:
    timeout: 2.0
  motor_ctrl:
    timeout: 2.0
  det_ctrl:
    timeout: 2.0


views:
  light_widget: {}
  motor_widget: {}
  acq_widget: {}
  img_widget: {}
  det_widget: {}
  storage_widget: {}
