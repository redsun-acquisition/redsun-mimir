schema_version: 1.0
session: redsun-mimir
frontend: pyqt

devices:
  serial:
    port: COM4
  stage:
    step_sizes:
      X: 100.0
      Y: 100.0
      Z: 100.0
    egu: um
  laser:
    wavelength: 650
    egu: mW
    intensity_range: [0, 1023]
    step_size: 1
  camera:
    config: daheng


presenters:
  storage_ctrl: {}
  acq_ctrl:
    callbacks: [det_ctrl, median_ctrl]
  median_ctrl:
    median_streams: [square_scan]
    live_streams: [live]
  light_ctrl:
    timeout: 2.0
  motor_ctrl:
    timeout: 2.0
  det_ctrl:
    timeout: 2.0


views:
  light_widget: {}
  motor_widget: {}
  acq_widget: {}
  img_widget: {}
  det_widget: {}
  storage_widget: {}
