schema_version: 1.0
session: redsun-mimir
frontend: pyqt

devices:
  camera:
    sensor_shape: [100, 100]
  motor:
    axis:
      - X
      - Y
      - Z
    step_sizes:
      X: 100.0
      Y: 100.0
      Z: 100.0
    egu: um

presenters:
  median_ctrl: {}
    # scan_streams: [square_scan]
    # live_streams: [live]
    # hints: [buffer]
  det_ctrl:
    timeout: 5.0
  acq_ctrl:
    timeout: 5.0
    callbacks: [det_ctrl, median_ctrl]

views:
  acq_widget: {}
  det_widget: {}
